[graph]
all-features = true

[advisories]
unmaintained = "workspace"
unsound = "workspace"
yanked = "deny"
ignore = [
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile is a direct TLS parser dependency; warnings remain surfaced by cargo audit while we track replacement." },
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "allow"
wildcards = "warn"
deny = [
    { name = "openssl", reason = "Prefer rustls-backed dependencies in Tachyon Mesh runtime paths." },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
