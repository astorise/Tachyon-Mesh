apiVersion: apps/v1
kind: Deployment
metadata:
  name: tachyon-host
  labels:
    app: tachyon-host
    deployment: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tachyon-host
  template:
    metadata:
      labels:
        app: tachyon-host
    spec:
      containers:
        - name: core-host
          image: ghcr.io/astorise/tachyon-mesh:sha-48a5663
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: tachyon-service
  labels:
    app: tachyon-host
spec:
  selector:
    app: tachyon-host
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
