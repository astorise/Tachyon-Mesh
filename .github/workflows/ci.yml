name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  security-audit:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install security tooling
        run: cargo install cargo-audit cargo-deny --locked

      - name: Run cargo audit
        run: cargo audit

      - name: Run cargo deny
        run: cargo deny check advisories licenses bans sources

  rust-ci:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install Linux system dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip1,wasm32-wasip2

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings -D clippy::unwrap_used

      - name: Build guest artifacts
        run: |
          cargo build -p guest-ai --target wasm32-wasip1 --release
          cargo build -p guest-example --target wasm32-wasip2 --release
          cargo build -p guest-flaky --target wasm32-wasip2 --release
          cargo build -p guest-grpc --target wasm32-wasip2 --release
          cargo build -p guest-log-storm --target wasm32-wasip1 --release
          cargo build -p guest-tcp-echo --target wasm32-wasip1 --release
          cargo build -p guest-udp-echo --target wasm32-wasip2 --release
          cargo build -p guest-voip-gate --target wasm32-wasip2 --release
          cargo build -p guest-volume --target wasm32-wasip2 --release
          cargo build -p system-faas-bridge --target wasm32-wasip2 --release
          cargo build -p system-faas-authn --target wasm32-wasip2 --release
          cargo build -p system-faas-authz --target wasm32-wasip2 --release
          cargo build -p system-faas-cert-manager --target wasm32-wasip2 --release
          cargo build -p system-faas-cdc --target wasm32-wasip2 --release
          cargo build -p system-faas-buffer --target wasm32-wasip2 --release
          cargo build -p system-faas-gc --target wasm32-wasip2 --release
          cargo build -p system-faas-gateway --target wasm32-wasip2 --release
          cargo build -p system-faas-gossip --target wasm32-wasip2 --release
          cargo build -p system-faas-keda --target wasm32-wasip2 --release
          cargo build -p system-faas-k8s-scaler --target wasm32-wasip2 --release
          cargo build -p system-faas-logger --target wasm32-wasip2 --release
          cargo build -p system-faas-model-broker --target wasm32-wasip2 --release
          cargo build -p system-faas-metering --target wasm32-wasip2 --release
          cargo build -p system-faas-prom --target wasm32-wasip2 --release
          cargo build -p system-faas-registry --target wasm32-wasip2 --release
          cargo build -p system-faas-s3-proxy --target wasm32-wasip2 --release
          cargo build -p system-faas-sqs --target wasm32-wasip2 --release
          cargo build -p system-faas-storage-broker --target wasm32-wasip2 --release
          cargo build -p guest-call-legacy --target wasm32-wasip1 --release
          cargo build -p guest-loop --target wasm32-wasip1 --release

      - name: Run tests
        run: cargo test --workspace

      - name: Generate core-host coverage
        run: |
          cargo install cargo-llvm-cov --locked
          cargo llvm-cov -p core-host --lcov --output-path lcov.info

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: core-host-lcov-${{ github.sha }}
          if-no-files-found: error
          path: lcov.info

      - name: Check ai-inference host build
        run: cargo check -p core-host --features ai-inference

      - name: Build core-host in release mode
        run: cargo build -p core-host --release

      - name: Build tachyon-ui in release mode
        run: cargo build -p tachyon-ui --release

      - name: Upload CI build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tachyon-mesh-build-${{ github.sha }}
          if-no-files-found: error
          path: |
            integrity.lock
            target/release/core-host
            target/release/tachyon-ui
            target/wasm32-wasip1/release/guest_ai.wasm
            target/wasm32-wasip2/release/guest_example.wasm
            target/wasm32-wasip2/release/guest_flaky.wasm
            target/wasm32-wasip2/release/guest_grpc.wasm
            target/wasm32-wasip1/release/guest_log_storm.wasm
            target/wasm32-wasip1/release/guest_tcp_echo.wasm
            target/wasm32-wasip2/release/guest_udp_echo.wasm
            target/wasm32-wasip2/release/guest_voip_gate.wasm
            target/wasm32-wasip2/release/guest_volume.wasm
            target/wasm32-wasip2/release/system_faas_bridge.wasm
            target/wasm32-wasip2/release/system_faas_authn.wasm
            target/wasm32-wasip2/release/system_faas_authz.wasm
            target/wasm32-wasip2/release/system_faas_cert_manager.wasm
            target/wasm32-wasip2/release/system_faas_cdc.wasm
            target/wasm32-wasip2/release/buffer.wasm
            target/wasm32-wasip2/release/system_faas_gc.wasm
            target/wasm32-wasip2/release/system_faas_gateway.wasm
            target/wasm32-wasip2/release/gossip.wasm
            target/wasm32-wasip2/release/k8s_scaler.wasm
            target/wasm32-wasip2/release/system_faas_logger.wasm
            target/wasm32-wasip2/release/system_faas_model_broker.wasm
            target/wasm32-wasip2/release/metering.wasm
            target/wasm32-wasip2/release/metrics.wasm
            target/wasm32-wasip2/release/system_faas_registry.wasm
            target/wasm32-wasip2/release/scaling.wasm
            target/wasm32-wasip2/release/system_faas_s3_proxy.wasm
            target/wasm32-wasip2/release/system_faas_sqs.wasm
            target/wasm32-wasip2/release/system_faas_storage_broker.wasm
            target/wasm32-wasip1/release/guest_loop.wasm

  feature-matrix-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "--no-default-features"
          - "--all-features"
          - "--features http3"
          - "--features rate-limit,resiliency,mtls,secrets-vault,websockets"
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Test core-host feature set
        run: cargo test -p core-host ${{ matrix.features }}

  mutation-tests:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Run auth mutation tests
        run: cargo mutants --package core-host --file core-host/src/auth.rs --timeout 120

  miri-cwasm-cache:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      MIRIFLAGS: "-Zmiri-disable-isolation"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install nightly Miri
        run: |
          rustup toolchain install nightly --component miri
          cargo +nightly miri setup

      - name: Run cwasm cache Miri smoke test
        run: cargo +nightly miri test -p core-host cwasm_cache_deserializes_same_engine_component --no-default-features

  publish-docker-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: rust-ci
    runs-on: ubuntu-latest
    env:
      BUILDKIT_PROGRESS: plain
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: tachyon-mesh
            dockerfile: ./Dockerfile
            context: .
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Normalize image owner
        id: owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image_name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
