name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust-ci:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Install Linux system dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build guest-example for WASI
        run: cargo build -p guest-example --target wasm32-wasip1 --release

      - name: Run tests
        run: cargo test --workspace

      - name: Build core-host in release mode
        run: cargo build -p core-host --release

      - name: Build tachyon-cli in release mode
        run: cargo build -p tachyon-cli --release

      - name: Upload CI build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tachyon-mesh-build-${{ github.sha }}
          if-no-files-found: error
          path: |
            integrity.lock
            target/release/core-host
            target/release/tachyon-cli
            target/wasm32-wasip1/release/guest_example.wasm
