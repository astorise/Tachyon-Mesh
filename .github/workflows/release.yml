name: Publish Tachyon Desktop

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_targets: ""
            args: --bundles appimage,deb
            artifact_name: tachyon-desktop-linux
            artifact_path: |
              target/release/bundle/appimage/*.AppImage
              target/release/bundle/deb/*.deb
          - platform: macos-latest
            rust_targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
            artifact_name: tachyon-desktop-macos
            artifact_path: |
              target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              target/release/bundle/dmg/*.dmg
          - platform: windows-latest
            rust_targets: ""
            args: --bundles msi,nsis
            artifact_name: tachyon-desktop-windows
            artifact_path: |
              target/release/bundle/msi/*.msi
              target/release/bundle/nsis/*.exe
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tachyon-ui/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux system dependencies for Tauri
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
          || sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: ./tachyon-ui
        run: npm install

      - name: Generate Rust SBOM
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          cargo install cargo-sbom --locked
          cargo sbom --output-format spdx_json_2_3 > tachyon-mesh.spdx.json

      - name: Build Tauri bundles for push artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tachyon-ui
          args: ${{ matrix.args }}

      - name: Publish Tauri bundles for version tags
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tachyon-ui
          tagName: ${{ github.ref_name }}
          releaseName: Tachyon Desktop v__VERSION__
          releaseBody: See the assets to download and install this version.
          releaseDraft: true
          prerelease: false
          releaseAssetNamePattern: tachyon-studio_[version]_[arch][ext]
          args: ${{ matrix.args }}

      - name: Upload desktop bundles
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ matrix.artifact_path }}

      - name: Upload SBOM
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v7
        with:
          name: tachyon-mesh-sbom
          if-no-files-found: error
          path: tachyon-mesh.spdx.json
