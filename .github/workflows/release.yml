name: Publish Tachyon Desktop

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_targets: ""
            args: --bundles appimage,deb
          - platform: macos-latest
            rust_targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - platform: windows-latest
            rust_targets: ""
            args: --bundles msi,nsis
    runs-on: ${{ matrix.platform }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tachyon-cli/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux system dependencies for Tauri
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
          || sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: ./tachyon-cli
        run: npm install

      - name: Build Tauri bundles for push artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tachyon-cli
          uploadWorkflowArtifacts: true
          args: ${{ matrix.args }}

      - name: Publish Tauri bundles for version tags
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tachyon-cli
          tagName: ${{ github.ref_name }}
          releaseName: Tachyon Desktop v__VERSION__
          releaseBody: See the assets to download and install this version.
          releaseDraft: true
          prerelease: false
          releaseAssetNamePattern: tachyon-studio_[version]_[arch][ext]
          uploadWorkflowArtifacts: true
          args: ${{ matrix.args }}
