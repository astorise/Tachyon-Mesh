<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tachyon Mesh</title>
    <link href="/src/style.css" rel="stylesheet" />
  </head>
  <body class="m-0 bg-slate-950">
    <div id="app" class="flex h-screen w-full overflow-hidden bg-slate-950 font-sans text-slate-50">
      <aside id="sidebar" class="flex w-64 flex-shrink-0 flex-col border-r border-slate-800 bg-slate-900 transition-all duration-300">
        <div class="flex h-16 items-center border-b border-slate-800 px-6">
          <span class="text-lg font-bold text-cyan-400">Tachyon Mesh</span>
        </div>
        <nav id="sidebar-nav" class="flex-grow overflow-y-auto py-4">
          <a href="#/dashboard" class="nav-link mx-2 flex items-center gap-3 rounded-md px-4 py-2 text-slate-400 transition-colors hover:bg-slate-800/50 hover:text-cyan-400">Dashboard</a>
          <a href="#/routing" class="nav-link mx-2 flex items-center gap-3 rounded-md px-4 py-2 text-slate-400 transition-colors hover:bg-slate-800/50 hover:text-cyan-400">Routing &amp; Gateways</a>
          <a href="#/security" class="nav-link mx-2 flex items-center gap-3 rounded-md px-4 py-2 text-slate-400 transition-colors hover:bg-slate-800/50 hover:text-cyan-400">Security &amp; IAM</a>
        </nav>
      </aside>

      <div class="flex w-full flex-grow flex-col">
        <header id="topbar" class="flex h-16 items-center justify-between border-b border-slate-800 bg-slate-950 px-6">
          <button id="toggle-sidebar" class="text-slate-400 hover:text-slate-100 focus:outline-none" aria-label="Toggle sidebar">
            Menu
          </button>
          <div class="flex items-center gap-4">
            <span id="network-status" class="text-sm text-emerald-400">Connected</span>
            <span id="user-role" class="rounded bg-slate-800 px-2 py-1 text-sm">Admin</span>
          </div>
        </header>

        <main id="route-view" class="flex-grow overflow-y-auto p-6"></main>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
